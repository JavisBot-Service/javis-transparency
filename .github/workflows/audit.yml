name: model-audit

# 公开模型真伪审计：在 GitHub runner（非 Javis 服务器）上运行公开代码，
# 由 github-actions[bot] 提交结果。运行日志对公众可见。
on:
  schedule:
    - cron: "7 2,8,14,20 * * *"   # 每 6 小时（UTC）
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        type: choice
        default: audit
        options: [audit, capture-baseline]

permissions:
  contents: write   # 仅需写仓库以提交结果，最小权限

concurrency:
  group: model-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run audit
        env:
          JAVIS_PROBE_KEY: ${{ secrets.JAVIS_PROBE_KEY }}   # 注入环境变量，绝不在日志打印
        run: |
          if [ "${{ github.event.inputs.mode }}" = "capture-baseline" ]; then
            python3 audit/probe_public.py --capture-baseline
          else
            python3 audit/probe_public.py
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/baselines docs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "audit: ${{ github.event.inputs.mode || 'audit' }} @ $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            # 抗并发：若 main 在运行期间前进（并发运行/手动推送），rebase 后重试
            pushed=0
            for n in 1 2 3 4 5; do
              if git push; then pushed=1; break; fi
              echo "push 被拒（main 已前进），rebase 重试 $n ..."
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
              sleep 3
            done
            if [ "$pushed" != "1" ]; then echo "::error::push 重试 5 次仍失败" && exit 1; fi
          fi
